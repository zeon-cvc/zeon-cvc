<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1180 610" width="100%" height="100%">
  <defs>
    <!-- Premium Deep Purple Cyber Gradient -->
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#080312" />
      <stop offset="50%" stop-color="#120626" />
      <stop offset="100%" stop-color="#05010a" />
    </linearGradient>

    <!-- UI Glass Panel Gradient -->
    <linearGradient id="panelGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#1a0b36" stop-opacity="0.9" />
      <stop offset="100%" stop-color="#0d041c" stop-opacity="0.75" />
    </linearGradient>

    <!-- Electric Purple & Pink Neon Border -->
    <linearGradient id="borderGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#a855f7" stop-opacity="0.8">
        <animate attributeName="offset" values="0; 1; 0" dur="6s" repeatCount="indefinite" />
      </stop>
      <stop offset="50%" stop-color="#ec4899" stop-opacity="0.4">
        <animate attributeName="offset" values="0.2; 0.8; 0.2" dur="6s" repeatCount="indefinite" />
      </stop>
      <stop offset="100%" stop-color="#6366f1" stop-opacity="0.8">
        <animate attributeName="offset" values="0.5; 1; 0.5" dur="6s" repeatCount="indefinite" />
      </stop>
    </linearGradient>

    <!-- Text Neon Gradient -->
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#c084fc" />
      <stop offset="50%" stop-color="#f472b6" />
      <stop offset="100%" stop-color="#818cf8" />
    </linearGradient>

    <!-- Cat Eyes / Neon Accents -->
    <linearGradient id="cyanNeon" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#22d3ee" />
      <stop offset="100%" stop-color="#0891b2" />
    </linearGradient>

    <!-- Neon Glowing Filters -->
    <filter id="neonGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="5" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>
    
    <filter id="cyanGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="4" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <filter id="ambientGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="60" result="blur" />
      <feComposite in="SourceGraphic" in2="blur" operator="over" />
    </filter>

    <!-- Tech Grid Pattern -->
    <pattern id="cyberGrid" width="30" height="30" patternUnits="userSpaceOnUse">
      <path d="M 30 0 L 0 0 0 30" fill="none" stroke="#a855f7" stroke-width="0.5" stroke-opacity="0.04" />
    </pattern>

    <mask id="textMask">
      <rect x="0" y="0" width="0" height="40" fill="#ffffff">
        <animate attributeName="width" values="0; 350; 350; 0; 0" dur="8s" repeatCount="indefinite" keyTimes="0; 0.4; 0.6; 0.9; 1" />
      </rect>
    </mask>

    <clipPath id="leftBoxClip">
      <rect x="15" y="15" width="350" height="480" rx="14" />
    </clipPath>

    <style>
      @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&amp;family=Share+Tech+Mono&amp;family=Plus+Jakarta+Sans:wght@600;700&amp;display=swap');
      .hud-title { font-family: 'Orbitron', sans-serif; font-weight: 900; fill: #f8fafc; letter-spacing: 2px; }
      .body-mono { font-family: 'Share Tech Mono', monospace; fill: #a78bfa; }
      .pill-mono { font-family: 'Share Tech Mono', monospace; font-size: 13px; fill: #f472b6; }
      .label-text { font-family: 'Plus Jakarta Sans', sans-serif; font-weight: 600; fill: #94a3b8; }
      .clickable { transition: all 0.2s ease; cursor: pointer; }
      .clickable:hover { filter: url(#neonGlow); opacity: 0.9; }
    </style>
  </defs>

  <g clip-path="url(#canvasClip)">
    <!-- Base Canvas Space Background -->
    <rect width="1180" height="610" fill="url(#bgGrad)" />
    <rect width="1180" height="610" fill="url(#cyberGrid)" />

    <!-- Ambient Cosmic Color Aura Nodes -->
    <circle cx="220" cy="250" r="230" fill="#ec4899" opacity="0.15" filter="url(#ambientGlow)">
      <animate attributeName="r" values="200;240;200" dur="5s" repeatCount="indefinite"/>
    </circle>
    <circle cx="920" cy="380" r="220" fill="#a855f7" opacity="0.15" filter="url(#ambientGlow)" />

    <!-- ==================== LEFT SIDE: DETAILED MECHA CYBER-CAT ==================== -->
    <g transform="translate(60, 50)">
      <g>
        <animateTransform attributeName="transform" type="translate" values="0,0; 0,-6; 0,0" dur="4s" repeatCount="indefinite" easing="ease-in-out"/>
        
        <!-- Frame Container -->
        <rect width="380" height="510" rx="16" fill="url(#panelGrad)" stroke="url(#borderGrad)" stroke-width="2" />
        
        <g clip-path="url(#leftBoxClip)">
          <!-- Tech HUD Background Rings -->
          <circle cx="190" cy="240" r="130" fill="none" stroke="#ec4899" stroke-width="1" stroke-dasharray="5 10" opacity="0.25"/>
          <circle cx="190" cy="240" r="105" fill="none" stroke="#a855f7" stroke-width="1.5" stroke-dasharray="80 40 20 40" opacity="0.4">
            <animateTransform attributeName="transform" type="rotate" from="0" to="360" rx="190" ry="240" dur="15s" repeatCount="indefinite"/>
          </circle>

          <!-- ADVANCED VECTOR MECHA CAT ART -->
          <g transform="translate(190, 245)">
            <!-- Cat Ears (Outer Armor) -->
            <path d="M -55 -40 L -85 -105 L -25 -65 Z" fill="#1f1235" stroke="#ec4899" stroke-width="2" stroke-linejoin="round"/>
            <path d="M 55 -40 L 85 -105 L 25 -65 Z" fill="#1f1235" stroke="#ec4899" stroke-width="2" stroke-linejoin="round"/>
            
            <!-- Cat Ears (Inner Shield Panel) -->
            <path d="M -48 -46 L -72 -92 L -28 -62 Z" fill="#3b1d5c" stroke="#22d3ee" stroke-width="1" />
            <path d="M 48 -46 L 72 -92 L 28 -62 Z" fill="#3b1d5c" stroke="#22d3ee" stroke-width="1" />

            <!-- Main Head Outer Armor Shell -->
            <path d="M -60 -40 L 0 -55 L 60 -40 L 70 10 L 45 55 L 0 75 L -45 55 L -70 10 Z" fill="#130924" stroke="#a855f7" stroke-width="2.5" stroke-linejoin="round"/>

            <!-- Forehead Tech Plate Plating -->
            <path d="M -25 -50 L 25 -50 L 35 -25 L 0 -10 L -35 -25 Z" fill="#241442" stroke="#f472b6" stroke-width="1.5"/>
            <line x1="0" y1="-50" x2="0" y2="-10" stroke="#f472b6" stroke-width="1" opacity="0.7"/>

            <!-- Glowing Cybernetic Cat Eyes -->
            <polygon points="-42,-12 -15,-18 -10,-8 -32,-4" fill="url(#cyanNeon)" filter="url(#cyanGlow)"/>
            <polygon points="42,-12 15,-18 10,-8 32,-4" fill="url(#cyanNeon)" filter="url(#cyanGlow)"/>
            
            <!-- Cheek Armor Overlays -->
            <path d="M -65 5 L -40 -2 L -35 25 L -55 35 Z" fill="#1f1235" stroke="#a855f7" stroke-width="1.5"/>
            <path d="M 65 5 L 40 -2 L 35 25 L 55 35 Z" fill="#1f1235" stroke="#a855f7" stroke-width="1.5"/>

            <!-- Mecha Snout & Nose Panel -->
            <polygon points="0,5 -8,-5 8,-5" fill="#22d3ee" filter="url(#cyanGlow)"/>
            <path d="M -12 18 L 0 8 L 12 18 L 0 28 Z" fill="#241442" stroke="#ec4899" stroke-width="1.5"/>

            <!-- Cyber Whiskers Lines -->
            <line x1="-45" y1="20" x2="-80" y2="15" stroke="#22d3ee" stroke-width="1.5" opacity="0.8" filter="url(#cyanGlow)"/>
            <line x1="-42" y1="30" x2="-75" y2="32" stroke="#22d3ee" stroke-width="1.5" opacity="0.6"/>
            <line x1="45" y1="20" x2="80" y2="15" stroke="#22d3ee" stroke-width="1.5" opacity="0.8" filter="url(#cyanGlow)"/>
            <line x1="42" y1="30" x2="75" y2="32" stroke="#22d3ee" stroke-width="1.5" opacity="0.6"/>

            <!-- Collar / Neck Bracket Support -->
            <path d="M -30 68 L -50 110 L 50 110 L 30 68 Z" fill="#130924" stroke="#a855f7" stroke-width="2"/>
            <!-- Glowing Power Core Node on Collar -->
            <circle cx="0" cy="92" r="7" fill="#ec4899" filter="url(#neonGlow)">
              <animate attributeName="opacity" values="0.5;1;0.5" dur="2s" repeatCount="indefinite"/>
            </circle>

            <!-- Data Overlay UI Tickers -->
            <path d="M -130 -160 L -90 -160 L -80 -150" fill="none" stroke="#f472b6" stroke-width="1" opacity="0.4"/>
            <text class="body-mono" x="-75" y="-146" font-size="10" fill="#f472b6" opacity="0.6">MODEL: NEKO_V2.0</text>
          </g>
        </g>

        <!-- Technical Label -->
        <rect x="25" y="450" width="330" height="34" rx="6" fill="#0b0316" fill-opacity="0.7" stroke="rgba(236,72,153,0.2)" stroke-width="1"/>
        <text class="body-mono" x="190" y="472" font-size="13" fill="#ec4899" text-anchor="middle" letter-spacing="1">
          COMPANION // <tspan fill="#f8fafc" font-weight="bold">CYBER_NEKO</tspan>
        </text>
      </g>
    </g>

    <!-- ==================== RIGHT SIDE: CYBER COMPILER TERMINAL PANEL ==================== -->
    <g transform="translate(480, 50)">
      <rect width="640" height="510" rx="16" fill="url(#panelGrad)" stroke="url(#borderGrad)" stroke-width="1.5" />
      
      <!-- Terminal Window Bar -->
      <circle cx="25" cy="25" r="5" fill="#ef4444" opacity="0.75"/>
      <circle cx="42" cy="25" r="5" fill="#eab308" opacity="0.75"/>
      <circle cx="59" cy="25" r="5" fill="#22c55e" opacity="0.75"/>
      <text class="body-mono" x="320" y="30" font-size="13" fill="#64748b" text-anchor="middle" letter-spacing="1">mainframe@zeon_core:~</text>
      <line x1="0" y1="50" x2="640" y2="50" stroke="rgba(168,85,247,0.12)" stroke-width="1.5" />

      <!-- Main System Heading -->
      <g transform="translate(40, 98)">
        <text class="body-mono" font-size="20" fill="#ec4899" x="0" y="0">❯</text>
        <text class="hud-title" font-size="34" x="25" y="4">SYSTEM: <tspan fill="url(#textGrad)">ZEON</tspan></text>
        
        <!-- Typewriter Subtext Loop -->
        <g transform="translate(25, 42)">
          <text class="body-mono" font-size="18" fill="#a78bfa" x="0" y="0" mask="url(#textMask)">Full-Stack Development Architect</text>
          <text class="body-mono" font-size="18" fill="#f472b6" x="0" y="0" mask="url(#textMask)">High-Performance Systems Automation<animate attributeName="opacity" values="0;0;1;0;0" dur="8s" repeatCount="indefinite" keyTimes="0;0.3;0.35;0.65;1" /></text>
          <text class="body-mono" font-size="18" fill="#818cf8" x="0" y="0" mask="url(#textMask)">Advanced AI Integration Engineer<animate attributeName="opacity" values="0;0;1;0;0" dur="8s" repeatCount="indefinite" keyTimes="0;0.65;0.7;0.95;1" /></text>
          
          <!-- Blinking Cursor -->
          <rect x="335" y="-16" width="2" height="20" fill="#f472b6">
            <animate attributeName="opacity" values="0;1;0" dur="0.8s" repeatCount="indefinite" />
            <animateTransform attributeName="transform" type="translate" values="0,0; -60,0; -40,0; 0,0" dur="8s" repeatCount="indefinite" keyTimes="0;0.35;0.7;1"/>
          </rect>
        </g>
      </g>

      <!-- Architecture Metrics -->
      <g transform="translate(40, 190)" font-size="15">
        <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.1s" fill="freeze"/><text class="body-mono" fill="#ec4899" x="0" y="0">[01]</text><text class="body-mono" fill="#f8fafc" x="45" y="0">WEB ARCHITECTURE</text><text class="label-text" x="220" y="-1">Designing reliable, scalable cloud frontends</text></g>
        <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.2s" fill="freeze"/><text class="body-mono" fill="#f472b6" x="0" y="32">[02]</text><text class="body-mono" fill="#f8fafc" x="45" y="32">WORKFLOW AUTOMATION</text><text class="label-text" x="220" y="31">Robust system scripting &amp; optimization engines</text></g>
        <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.3s" fill="freeze"/><text class="body-mono" fill="#a855f7" x="0" y="64">[03]</text><text class="body-mono" fill="#f8fafc" x="45" y="64">DISCORD API BOTNETS</text><text class="label-text" x="220" y="63">Rich application logic &amp; custom webhooks ecosystems</text></g>
        <g opacity="0"><animate attributeName="opacity" values="0;1" dur="0.4s" begin="0.4s" fill="freeze"/><text class="body-mono" fill="#6366f1" x="0" y="96">[04]</text><text class="body-mono" fill="#f8fafc" x="45" y="96">SERVER OPTIMIZATION</text><text class="label-text" x="220" y="95">Fine-tuned game logic &amp; multi-threaded computing</text></g>
      </g>

      <!-- Matrix Tech Grid Badges -->
      <g transform="translate(40, 340)">
        <text class="body-mono" font-size="12" fill="#64748b" letter-spacing="1.5">// TECH_CORE_STACK_MATRIX</text>
        
        <g transform="translate(0, 22)">
          <g class="clickable" transform="translate(0,0)"><rect width="90" height="28" rx="6" fill="#140727" stroke="rgba(236,72,153,0.2)" /><text class="pill-mono" x="45" y="18" text-anchor="middle">Full-Stack</text></g>
          <g class="clickable" transform="translate(100,0)"><rect width="100" height="28" rx="6" fill="#140727" stroke="rgba(236,72,153,0.2)" /><text class="pill-mono" x="50" y="18" text-anchor="middle">AI Systems</text></g>
          <g class="clickable" transform="translate(210,0)"><rect width="95" height="28" rx="6" fill="#140727" stroke="rgba(236,72,153,0.2)" /><text class="pill-mono" x="47.5" y="18" text-anchor="middle">Discord API</text></g>
          <g class="clickable" transform="translate(315,0)"><rect width="105" height="28" rx="6" fill="#140727" stroke="rgba(236,72,153,0.2)" /><text class="pill-mono" x="52.5" y="18" text-anchor="middle">Shell Scripts</text></g>
          <g class="clickable" transform="translate(430,0)"><rect width="125" height="28" rx="6" fill="#140727" stroke="rgba(236,72,153,0.2)" /><text class="pill-mono" x="62.5" y="18" text-anchor="middle">Sys Optimization</text></g>
          
          <g class="clickable" transform="translate(0,40)"><rect width="95" height="28" rx="6" fill="#140727" stroke="rgba(236,72,153,0.2)" /><text class="pill-mono" x="47.5" y="18" text-anchor="middle">TypeScript</text></g>
          <g class="clickable" transform="translate(105,40)"><rect width="80" height="28" rx="6" fill="#140727" stroke="rgba(236,72,153,0.2)" /><text class="pill-mono" x="40" y="18" text-anchor="middle">Python</text></g>
          <g class="clickable" transform="translate(195,40)"><rect width="80" height="28" rx="6" fill="#140727" stroke="rgba(236,72,153,0.2)" /><text class="pill-mono" x="40" y="18" text-anchor="middle">Node.js</text></g>
          <g class="clickable" transform="translate(285,40)"><rect width="90" height="28" rx="6" fill="#140727" stroke="rgba(236,72,153,0.2)" /><text class="pill-mono" x="45" y="18" text-anchor="middle">React/Next</text></g>
          <g class="clickable" transform="translate(385,40)"><rect width="95" height="28" rx="6" fill="#140727" stroke="rgba(236,72,153,0.2)" /><text class="pill-mono" x="47.5" y="18" text-anchor="middle">Automation</text></g>
        </g>
      </g>

      <!-- Footer Anchors -->
      <g transform="translate(40, 455)">
        <line x1="0" y1="0" x2="560" y2="0" stroke="rgba(168,85,247,0.15)" stroke-width="1" />
        <g transform="translate(0, 15)">
          <g transform="translate(0,0)" fill="#f472b6" class="clickable"><rect width="32" height="32" rx="6" fill="#0b0316" stroke="rgba(168,85,247,0.2)" stroke-width="1" /><path d="M16 8a6 6 0 0 0-1.9 11.7c.3.05.4-.13.4-.3v-1c-1.7.36-2-.82-2-.82-.27-.7-.67-.88-.67-.88-.54-.37.04-.36.04-.36.6.04.92.62.92.62.54.92 1.4.65 1.75.5a1.25 1.25 0 0 1 .4-.78c-1.34-.15-2.75-.67-2.75-3a2.3 2.3 0 0 1 .6-1.6 2.15 2.15 0 0 1 .06-1.6s.5-.15 1.6.6a5.5 5.5 0 0 1 3 0c1.1-.75 1.6-.6 1.6-.6a2.15 2.15 0 0 1 .06 1.6 2.3 2.3 0 0 1 .6 1.6c0 2.33-1.4 2.83-2.76 2.98.2.2.4.54.4 1.1v1.6c0 .17.1.36.4.3A6 6 0 0 0 16 8z" fill="#f472b6"/></g>
          <g transform="translate(44,0)" fill="#f472b6" class="clickable"><rect width="32" height="32" rx="6" fill="#0b0316" stroke="rgba(168,85,247,0.2)" stroke-width="1" /><path d="M19.27 8.51a0.07 0.07 0 0 0-.04-.03 14.94 14.94 0 0 0-3.7-1.15 0.07 0.07 0 0 0-.08.04c-.16.29-.34.67-.47.98a13.73 13.73 0 0 0-4 0 9.7 9.7 0 0 0-.48-.98 0.07 0.07 0 0 0-.08-.04 14.93 14.93 0 0 0-3.7 1.15 0.07 0.07 0 0 0-.03.03A16.14 16.14 0 0 0 2.62 17.6a0.08 0.08 0 0 0 .03.06 15.22 15.22 0 0 0 4.58 2.32 0.08 0.08 0 0 0 .09-.03c.35-.48.66-.99.92-1.53a0.08 0.08 0 0 0-.04-.11 9.93 9.93 0 0 1-1.43-.68 0.08 0.08 0 1-.01-.13c.1-.07.19-.15.28-.23a0.08 0.08 0 1 .08-.01 10.82 10.82 0 0 0 12 0 0.08 0.08 0 1 .08.01c.09.08.19.16.29.24a0.08 0.08 0 1-.01.13 9.66 9.66 0 0 1-1.43$.68 0.08 0.08 0 0-.04.11c.27.53.57 1.04.92 1.52a0.08 0.08 0 0 .09.03 15.15 15.15 0 0 0 4.59-2.32 0.08 0.08 0 0 .03-.06 16.19 16.19 0 0 0-4.14-9.13zM9.79 15.11c-.9 0-1.63-.83-1.63-1.85s.72-1.85 1.63-1.85c.91 0 1.64.83 1.64 1.85s-.72 1.85-1.64 1.85zm6.44 0c-.9 0-1.63-.83-1.63-1.85s.72-1.85 1.63-1.85c.91 0 1.64.83 1.64 1.85s-.72 1.85-1.64 1.85z" fill="#f472b6" transform="scale(0.85) translate(2.8, 2.8)"/></g>
        </g>
        
        <!-- Pulsing Heartbeat Node -->
        <g transform="translate(550, 20)">
          <circle cx="0" cy="0" r="4" fill="#f472b6" filter="url(#neonGlow)" />
          <circle cx="0" cy="0" r="9" fill="none" stroke="#f472b6" stroke-width="1" opacity="0.5">
            <animate attributeName="r" values="4;16;4" dur="2s" repeatCount="indefinite" />
            <animate attributeName="opacity" values="0.7;0;0.7" dur="2s" repeatCount="indefinite" />
          </circle>
        </g>
      </g>
    </g>
  </g>
</svg>
